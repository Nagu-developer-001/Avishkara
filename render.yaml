services:
  - type: web
    name: avishkara-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: avishkara-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.13"
      - key: DATABASE_SSL
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        value: '["https://avishkara-web.onrender.com","http://localhost:3000","http://127.0.0.1:3000"]'
      - key: CORS_ORIGIN_REGEX
        value: '^https://avishkara-web\.onrender\.com$'
      - key: UPLOAD_DIRECTORY
        value: uploads
      - key: LANDMARK_DIRECTORY
        value: landmarks
      - key: ANNOTATED_VIDEO_DIRECTORY
        value: annotated_videos
      - key: POSE_LANDMARKER_MODEL_PATH
        value: models/pose_landmarker_lite.task

  - type: web
    name: avishkara-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: "22.15.0"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://avishkara-api.onrender.com

databases:
  - name: avishkara-db
    plan: free
    databaseName: avishkara
    user: avishkara
